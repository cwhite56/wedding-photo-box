<!DOCTYPE html>
<html lang="en">
<head>
    <title>Wedding Photo Box</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        .file-button { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #f0f0f0; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
        #fileInput { display: none; }
        #fileLabel { margin-top: 8px; font-size: 0.9em; color: #555; }
        #uploadBtn { display: block; margin-top: 20px; padding: 12px 30px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
        #uploadBtn:disabled { background: #aaa; cursor: not-allowed; }
        .result { margin-top: 8px; padding: 8px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .failure { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <h2>📸 Wedding Photo Box</h2>

    <label for="sentBy">Your Name</label>
    <input type="text" id="sentBy" placeholder="Enter your name" />

    <label>Photos</label>
    <span class="file-button" onclick="document.getElementById('fileInput').click()">
        + Add Photos
    </span>
    <input type="file" id="fileInput" accept="image/*" multiple />
    <div id="fileLabel">No photos selected</div>

    <button id="uploadBtn" onclick="uploadPhotos()">Upload</button>

    <div id="results"></div>

    <script>
        // update label when files are selected
        document.getElementById("fileInput").addEventListener("change", function () {
            const count = this.files.length;
            document.getElementById("fileLabel").textContent =
                count === 0 ? "No photos selected" :
                count === 1 ? `1 photo selected` :
                `${count} photos selected`;
        });

        async function uploadPhotos() {
            const sentBy = document.getElementById("sentBy").value.trim();
            const files = document.getElementById("fileInput").files;
            const resultsDiv = document.getElementById("results");
            const uploadBtn = document.getElementById("uploadBtn");

            // validation
            if (!sentBy) {
                alert("Please enter your name");
                return;
            }
            if (files.length === 0) {
                alert("Please select at least one photo");
                return;
            }

            resultsDiv.innerHTML = "";
            uploadBtn.disabled = true;
            uploadBtn.textContent = "Uploading...";

            // one request per file to match your controller signature
            for (const file of files) {
                const formData = new FormData();
                formData.append("image", file);
                formData.append("data", new Blob(
                    [JSON.stringify({ sentBy: sentBy })],
                    { type: "application/json" }
                ));

                const result = document.createElement("div");
                result.classList.add("result");

                try {
                    const response = await fetch("/photos/upload", {
                        method: "POST",
                        body: formData
                    });

                    if (response.ok) {
                        result.classList.add("success");
                        result.textContent = `✓ ${file.name} uploaded successfully`;
                    } else {
                        result.classList.add("failure");
                        result.textContent = `✗ ${file.name} failed — ${response.statusText}`;
                    }
                } catch (error) {
                    result.classList.add("failure");
                    result.textContent = `✗ ${file.name} failed — ${error.message}`;
                }

                resultsDiv.appendChild(result);
            }

            uploadBtn.disabled = false;
            uploadBtn.textContent = "Upload";
        }
    </script>

</body>
</html>
